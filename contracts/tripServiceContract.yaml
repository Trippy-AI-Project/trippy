openapi: 3.0.3
info:
  title: Trip Service API Contract
  description: |
    ## Overview
    Complete API contract for the Trip Service microservice in the Trippy platform.
    This document serves as the blueprint for implementing this service.

    ## Service Responsibilities
    - Trip CRUD Operations (create, read, update, delete)
    - Itinerary Management (manual & AI-generated)
    - Participant Management (invitations, roles, join/leave)
    - Discovery Feed (public trips from verified hosts)
    - Trip Search & Filtering
    - Integration with AI Service for itinerary generation
    - Integration with User Service for quota validation

    ## Architecture Pattern
    **Hexagonal Architecture (Ports & Adapters)**
    - Domain layer contains Trip, Itinerary, Participant entities
    - Application layer contains use cases
    - Infrastructure layer contains REST adapters, DB repositories, external service clients

    ## API Categories
    | Category | Access | Description |
    |----------|--------|-------------|
    | **Public** | No Auth | Discovery feed (public trips) |
    | **Protected** | JWT (User) | Trip CRUD, Participants, Itinerary |
    | **Internal S2S** | Service Token | Chat Service queries |
    | **Admin** | JWT (Admin) | Trip moderation |

    ## S2S Communication (Outbound)
    | Target Service | Purpose | Endpoint Called |
    |----------------|---------|-----------------|
    | **User Service** | Check quota before trip creation | `GET /users/{userId}/subscription/quota` |
    | **User Service** | Increment usage after creation | `POST /users/{userId}/subscription/increment` |
    | **User Service** | Validate user exists (invitations) | `GET /users/{userId}/exists` |
    | **User Service** | Batch get user profiles | `POST /users/batch` |
    | **AI Service** | Generate itinerary | `POST /ai/itineraries` |

    ## Request Headers
    | Header | Required | Description |
    |--------|----------|-------------|
    | `Authorization` | Protected endpoints | `Bearer <access_token>` |
    | `X-User-Id` | Injected by Gateway | User UUID from JWT |
    | `X-User-Plan` | Injected by Gateway | Subscription tier |
    | `X-Service-Token` | Internal S2S | Service-to-service auth |
    | `X-Correlation-ID` | All requests | UUID for distributed tracing |

    ## Database Schema
    - **Schema Name**: `trip_schema`
    - **Tables**: 
      - `trips` - Core trip data (id, title, destination, organizer_id, status, visibility)
      - `itineraries` - Generated/manual itineraries (id, trip_id, generated_at, source)
      - `day_plans` - Daily plans within itinerary (id, itinerary_id, day_number, date)
      - `activities` - Activities within day plans (id, day_plan_id, time, title, location)
      - `participants` - Trip participants (trip_id, user_id, role, status, invited_at)

    ## External Dependencies
    | Dependency | Purpose |
    |------------|---------|
    | **PostgreSQL** | Trip data persistence |
    | **User Service** | Quota validation, user profiles |
    | **AI Service** | Itinerary generation |

  version: 1.0.0
  contact:
    name: Trip Domain Team
    email: trip-team@trippy.dev

servers:
  - url: http://localhost:8082
    description: Local Development (Direct)
  - url: http://localhost:3000
    description: Local via API Gateway
  - url: http://trip-service.internal:8082
    description: Internal Cluster URL (K8s/Docker)

tags:
  - name: Trips
    description: Trip CRUD operations
  - name: Itinerary
    description: Itinerary management and AI generation
  - name: Participants
    description: Participant and invitation management
  - name: Discovery
    description: Public trip discovery feed
  - name: Internal
    description: Service-to-service APIs
  - name: Admin
    description: Administrative operations

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

    ServiceAuth:
      type: apiKey
      in: header
      name: X-Service-Token

  parameters:
    CorrelationId:
      name: X-Correlation-ID
      in: header
      required: true
      schema:
        type: string
        format: uuid

    TripId:
      name: tripId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    # =====================================================
    # ERROR RESPONSES
    # =====================================================
    ErrorResponse:
      type: object
      required:
        - error
        - message
        - timestamp
      properties:
        error:
          type: string
        message:
          type: string
        timestamp:
          type: string
          format: date-time
        path:
          type: string
        details:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string

    # =====================================================
    # ENUMS
    # =====================================================
    TripStatus:
      type: string
      enum: ["DRAFT", "PLANNED", "ONGOING", "COMPLETED", "CANCELLED"]

    TripVisibility:
      type: string
      enum: ["PRIVATE", "PUBLIC"]

    ParticipantRole:
      type: string
      enum: ["OWNER", "EDITOR", "VIEWER"]

    ParticipantStatus:
      type: string
      enum: ["PENDING", "ACCEPTED", "DECLINED", "LEFT"]

    BudgetLevel:
      type: string
      enum: ["ECONOMY", "MODERATE", "LUXURY"]

    # =====================================================
    # TRIP SCHEMAS
    # =====================================================
    Trip:
      type: object
      required:
        - tripId
        - title
        - destination
        - organizerId
        - status
        - visibility
      properties:
        tripId:
          type: string
          format: uuid
        title:
          type: string
          example: "Summer in Paris"
        description:
          type: string
        destination:
          type: string
          example: "Paris, France"
        coverImageUrl:
          type: string
          format: uri
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        organizerId:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/TripStatus'
        visibility:
          $ref: '#/components/schemas/TripVisibility'
        budgetLevel:
          $ref: '#/components/schemas/BudgetLevel'
        participantCount:
          type: integer
        hasItinerary:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    TripDetail:
      allOf:
        - $ref: '#/components/schemas/Trip'
        - type: object
          properties:
            participants:
              type: array
              items:
                $ref: '#/components/schemas/Participant'
            itinerary:
              $ref: '#/components/schemas/Itinerary'
            organizer:
              $ref: '#/components/schemas/TripOrganizer'

    TripOrganizer:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        displayName:
          type: string
        avatarUrl:
          type: string
          format: uri
        isVerifiedHost:
          type: boolean

    Participant:
      type: object
      properties:
        participantId:
          type: string
          format: uuid
        tripId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        displayName:
          type: string
        avatarUrl:
          type: string
          format: uri
        role:
          $ref: '#/components/schemas/ParticipantRole'
        status:
          $ref: '#/components/schemas/ParticipantStatus'
        invitedAt:
          type: string
          format: date-time
        joinedAt:
          type: string
          format: date-time

    # =====================================================
    # ITINERARY SCHEMAS
    # =====================================================
    Itinerary:
      type: object
      properties:
        itineraryId:
          type: string
          format: uuid
        tripId:
          type: string
          format: uuid
        generatedAt:
          type: string
          format: date-time
        source:
          type: string
          enum: ["AI_GENERATED", "MANUAL", "TEMPLATE"]
        summary:
          type: string
        days:
          type: array
          items:
            $ref: '#/components/schemas/DayPlan'

    DayPlan:
      type: object
      properties:
        dayPlanId:
          type: string
          format: uuid
        dayNumber:
          type: integer
        date:
          type: string
          format: date
        title:
          type: string
        activities:
          type: array
          items:
            $ref: '#/components/schemas/Activity'

    Activity:
      type: object
      properties:
        activityId:
          type: string
          format: uuid
        time:
          type: string
        duration:
          type: integer
        title:
          type: string
        description:
          type: string
        location:
          type: string
        category:
          type: string
          enum: ["SIGHTSEEING", "FOOD", "TRANSPORT", "ACCOMMODATION", "ACTIVITY", "FREE_TIME"]
        estimatedCost:
          type: number
          format: float

    # =====================================================
    # REQUEST SCHEMAS
    # =====================================================
    CreateTripRequest:
      type: object
      required:
        - title
        - destination
      properties:
        title:
          type: string
          minLength: 3
          maxLength: 100
        description:
          type: string
          maxLength: 1000
        destination:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        budgetLevel:
          $ref: '#/components/schemas/BudgetLevel'
        visibility:
          $ref: '#/components/schemas/TripVisibility'

    UpdateTripRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        destination:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        budgetLevel:
          $ref: '#/components/schemas/BudgetLevel'
        status:
          $ref: '#/components/schemas/TripStatus'
        visibility:
          $ref: '#/components/schemas/TripVisibility'

    GenerateItineraryRequest:
      type: object
      properties:
        userPrompt:
          type: string
          maxLength: 500
          example: "Focus on art museums and hidden cafes."
        tone:
          type: string
          enum: ["RELAXED", "ADVENTUROUS", "FAMILY", "ROMANTIC", "CULTURAL"]
        includeTransport:
          type: boolean
          default: true
        includeMeals:
          type: boolean
          default: true

    InviteParticipantRequest:
      type: object
      required:
        - userId
      properties:
        userId:
          type: string
          format: uuid
        role:
          $ref: '#/components/schemas/ParticipantRole'
        message:
          type: string
          maxLength: 200

    # =====================================================
    # INTERNAL S2S SCHEMAS
    # =====================================================
    TripExistsResponse:
      type: object
      properties:
        exists:
          type: boolean
        tripId:
          type: string
          format: uuid
        organizerId:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/TripStatus'

    TripParticipantsResponse:
      type: object
      properties:
        tripId:
          type: string
          format: uuid
        participants:
          type: array
          items:
            type: object
            properties:
              userId:
                type: string
                format: uuid
              role:
                $ref: '#/components/schemas/ParticipantRole'
              status:
                $ref: '#/components/schemas/ParticipantStatus'

    # =====================================================
    # PAGINATION
    # =====================================================
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        pageSize:
          type: integer
        totalItems:
          type: integer
        totalPages:
          type: integer

    TripListResponse:
      type: object
      properties:
        trips:
          type: array
          items:
            $ref: '#/components/schemas/Trip'
        pagination:
          $ref: '#/components/schemas/PaginationMeta'

# =========================================================
# PATHS
# =========================================================
paths:
  # =====================================================
  # TRIP MANAGEMENT
  # =====================================================
  /trips:
    get:
      summary: List My Trips
      operationId: getMyTrips
      tags: [Trips]
      security: [BearerAuth: []]
      description: Returns all trips where the user is owner or participant.
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/TripStatus'
        - name: role
          in: query
          schema:
            $ref: '#/components/schemas/ParticipantRole'
        - name: page
          in: query
          schema: { type: integer, default: 0 }
        - name: size
          in: query
          schema: { type: integer, default: 20, maximum: 50 }
      responses:
        '200':
          description: Trip list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TripListResponse'

    post:
      summary: Create Trip
      operationId: createTrip
      tags: [Trips]
      security: [BearerAuth: []]
      description: |
        Creates a new trip. User becomes OWNER.
        
        **S2S Flow:**
        1. `GET http://localhost:8081/users/{userId}/subscription/quota` - Check quota
        2. Create trip in database
        3. `POST http://localhost:8081/users/{userId}/subscription/increment` - Increment usage
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTripRequest'
      responses:
        '201':
          description: Trip created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TripDetail'
        '403':
          description: Subscription quota exceeded

  /trips/{tripId}:
    get:
      summary: Get Trip Details
      operationId: getTrip
      tags: [Trips]
      security: [BearerAuth: []]
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/TripId'
      responses:
        '200':
          description: Trip details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TripDetail'
        '404':
          description: Trip not found

    patch:
      summary: Update Trip
      operationId: updateTrip
      tags: [Trips]
      security: [BearerAuth: []]
      description: Requires OWNER or EDITOR role.
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/TripId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTripRequest'
      responses:
        '200':
          description: Trip updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trip'
        '403':
          description: Insufficient permissions

    delete:
      summary: Delete Trip
      operationId: deleteTrip
      tags: [Trips]
      security: [BearerAuth: []]
      description: Only OWNER can delete.
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/TripId'
      responses:
        '204':
          description: Deleted
        '403':
          description: Only owner can delete

  /trips/{tripId}/cover:
    post:
      summary: Upload Cover Image
      operationId: uploadCoverImage
      tags: [Trips]
      security: [BearerAuth: []]
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/TripId'
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Cover uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  coverImageUrl:
                    type: string
                    format: uri

  # =====================================================
  # ITINERARY
  # =====================================================
  /trips/{tripId}/itinerary:
    get:
      summary: Get Itinerary
      operationId: getItinerary
      tags: [Itinerary]
      security: [BearerAuth: []]
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/TripId'
      responses:
        '200':
          description: Itinerary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Itinerary'

    put:
      summary: Update Itinerary
      operationId: updateItinerary
      tags: [Itinerary]
      security: [BearerAuth: []]
      description: Manual itinerary update. Requires OWNER or EDITOR.
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/TripId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Itinerary'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Itinerary'

  /trips/{tripId}/itinerary/generate:
    post:
      summary: Generate AI Itinerary
      operationId: generateItinerary
      tags: [Itinerary]
      security: [BearerAuth: []]
      description: |
        Calls AI Service to generate itinerary.
        
        **S2S Call:**
        `POST http://localhost:8084/ai/itineraries`
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/TripId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateItineraryRequest'
      responses:
        '200':
          description: Itinerary generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Itinerary'
        '429':
          description: AI quota exceeded
        '504':
          description: AI service timeout

  # =====================================================
  # PARTICIPANTS
  # =====================================================
  /trips/{tripId}/participants:
    get:
      summary: List Participants
      operationId: getParticipants
      tags: [Participants]
      security: [BearerAuth: []]
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/TripId'
      responses:
        '200':
          description: Participants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Participant'

  /trips/{tripId}/invitations:
    post:
      summary: Invite User
      operationId: inviteParticipant
      tags: [Participants]
      security: [BearerAuth: []]
      description: |
        Invite user to trip. Requires OWNER or EDITOR.
        
        **S2S Call:**
        `GET http://localhost:8081/users/{userId}/exists`
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/TripId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteParticipantRequest'
      responses:
        '201':
          description: Invited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Participant'
        '404':
          description: User not found

  /trips/{tripId}/invitations/accept:
    post:
      summary: Accept Invitation
      operationId: joinTrip
      tags: [Participants]
      security: [BearerAuth: []]
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/TripId'
      responses:
        '200':
          description: Joined
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Participant'

  /trips/{tripId}/invitations/decline:
    post:
      summary: Decline Invitation
      operationId: declineInvitation
      tags: [Participants]
      security: [BearerAuth: []]
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/TripId'
      responses:
        '200':
          description: Declined

  /trips/{tripId}/participants/leave:
    post:
      summary: Leave Trip
      operationId: leaveTrip
      tags: [Participants]
      security: [BearerAuth: []]
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/TripId'
      responses:
        '200':
          description: Left trip
        '400':
          description: Owner cannot leave

  /trips/{tripId}/participants/{userId}:
    patch:
      summary: Update Participant Role
      operationId: updateParticipant
      tags: [Participants]
      security: [BearerAuth: []]
      description: Only OWNER can update roles.
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/TripId'
        - $ref: '#/components/parameters/UserId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                role:
                  $ref: '#/components/schemas/ParticipantRole'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Participant'

    delete:
      summary: Remove Participant
      operationId: removeParticipant
      tags: [Participants]
      security: [BearerAuth: []]
      description: Only OWNER can remove.
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/TripId'
        - $ref: '#/components/parameters/UserId'
      responses:
        '204':
          description: Removed

  /trips/invitations:
    get:
      summary: My Pending Invitations
      operationId: getMyInvitations
      tags: [Participants]
      security: [BearerAuth: []]
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: Invitations
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    tripId:
                      type: string
                      format: uuid
                    tripTitle:
                      type: string
                    destination:
                      type: string
                    invitedBy:
                      $ref: '#/components/schemas/TripOrganizer'
                    invitedAt:
                      type: string
                      format: date-time
                    role:
                      $ref: '#/components/schemas/ParticipantRole'

  # =====================================================
  # DISCOVERY
  # =====================================================
  /trips/discover:
    get:
      summary: Discovery Feed
      operationId: getDiscoveryFeed
      tags: [Discovery]
      description: Public trips from verified hosts.
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - name: destination
          in: query
          schema: { type: string }
        - name: startDateFrom
          in: query
          schema: { type: string, format: date }
        - name: startDateTo
          in: query
          schema: { type: string, format: date }
        - name: budgetLevel
          in: query
          schema:
            $ref: '#/components/schemas/BudgetLevel'
        - name: page
          in: query
          schema: { type: integer, default: 0 }
        - name: size
          in: query
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: Feed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TripListResponse'

  /trips/{tripId}/join-requests:
    post:
      summary: Request to Join Public Trip
      operationId: requestJoinPublicTrip
      tags: [Discovery]
      security: [BearerAuth: []]
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/TripId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  maxLength: 300
      responses:
        '201':
          description: Request sent

  # =====================================================
  # INTERNAL S2S
  # =====================================================
  /trips/{tripId}/exists:
    get:
      summary: "[Internal] Check Trip Exists"
      operationId: internalCheckTripExists
      tags: [Internal]
      security: [ServiceAuth: []]
      description: "**Consumer**: Chat Service, Payment Service"
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/TripId'
      responses:
        '200':
          description: Trip info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TripExistsResponse'
        '404':
          description: Not found

  /trips/{tripId}/participants:
    get:
      summary: "[Internal] Get Participants"
      operationId: internalGetParticipants
      tags: [Internal]
      security: [ServiceAuth: []]
      description: "**Consumer**: Chat Service"
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/TripId'
      responses:
        '200':
          description: Participants
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TripParticipantsResponse'

  /trips/{tripId}/is-participant/{userId}:
    get:
      summary: "[Internal] Check Participant"
      operationId: internalIsParticipant
      tags: [Internal]
      security: [ServiceAuth: []]
      description: "**Consumer**: Chat Service"
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/TripId'
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: Status
          content:
            application/json:
              schema:
                type: object
                properties:
                  isParticipant:
                    type: boolean
                  role:
                    $ref: '#/components/schemas/ParticipantRole'
                  status:
                    $ref: '#/components/schemas/ParticipantStatus'

