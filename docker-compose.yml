# =============================================================================
# Trippy Platform — Full Stack Docker Compose
# =============================================================================
# Starts infrastructure + all microservices + frontend
#
# Usage (from project root):
#   docker compose up --build -d          # build & start everything
#   docker compose up --build ai-service  # rebuild one service
#   docker compose logs -f api-gateway    # tail gateway logs
#   docker compose down                   # stop everything
#   docker compose down -v                # stop + wipe volumes
#
# Prerequisites:
#   - .env file in project root (copy .env.example if needed)
#   - GROQ_API_KEY must be set in .env
# =============================================================================

services:

  # ===========================================================================
  # INFRASTRUCTURE
  # ===========================================================================

  postgres:
    image: postgres:16-alpine
    container_name: trippy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-trippy_db}
      POSTGRES_USER: ${POSTGRES_USER:-trippy_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/init-scripts/postgres:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    networks:
      - trippy-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trippy_admin} -d ${POSTGRES_DB:-trippy_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: trippy-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - trippy-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: trippy-rabbitmq
    hostname: trippy-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-trippy_mq}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:?RABBITMQ_DEFAULT_PASS is required}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_DEFAULT_VHOST:-trippy}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./infra/docker/config/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./infra/docker/config/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
      - ./infra/docker/config/rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    networks:
      - trippy-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ===========================================================================
  # APPLICATION SERVICES
  # ===========================================================================

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    image: trippy/user-service:latest
    container_name: trippy-user-service
    restart: unless-stopped
    environment:
      DB_USERNAME: ${DB_USERNAME:-trippy_admin}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/trippy_db?currentSchema=user_schema
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "8081:8081"
    networks:
      - trippy-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  trip-service:
    build:
      context: .
      dockerfile: services/trip-service/Dockerfile
    image: trippy/trip-service:latest
    container_name: trippy-trip-service
    restart: unless-stopped
    environment:
      DB_USERNAME: ${DB_USERNAME:-trippy_admin}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/trippy_db?currentSchema=trip_schema
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "8082:8082"
    networks:
      - trippy-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  chat-service:
    build:
      context: .
      dockerfile: services/chat-service/Dockerfile
    image: trippy/chat-service:latest
    container_name: trippy-chat-service
    restart: unless-stopped
    environment:
      DB_USERNAME: ${DB_USERNAME:-trippy_admin}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/trippy_db?currentSchema=chat_schema
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-trippy_mq}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS}
      SPRING_RABBITMQ_VIRTUAL_HOST: ${RABBITMQ_DEFAULT_VHOST:-trippy}
    ports:
      - "8083:8083"
    networks:
      - trippy-network
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  ai-service:
    build:
      context: .
      dockerfile: services/ai-service/Dockerfile
    image: trippy/ai-service:latest
    container_name: trippy-ai-service
    restart: unless-stopped
    environment:
      DB_USERNAME: ${DB_USERNAME:-trippy_admin}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/trippy_db?currentSchema=ai_schema
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      GROQ_API_KEY: ${GROQ_API_KEY:?GROQ_API_KEY is required}
    ports:
      - "8084:8084"
    networks:
      - trippy-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8084/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    image: trippy/notification-service:latest
    container_name: trippy-notification-service
    restart: unless-stopped
    environment:
      DB_USERNAME: ${DB_USERNAME:-trippy_admin}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/trippy_db?currentSchema=notification_schema
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-trippy_mq}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS}
      SPRING_RABBITMQ_VIRTUAL_HOST: ${RABBITMQ_DEFAULT_VHOST:-trippy}
      MQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-trippy_mq}
      MQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "8085:8085"
    networks:
      - trippy-network
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8085/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  payment-service:
    build:
      context: .
      dockerfile: services/payment-service/Dockerfile
    image: trippy/payment-service:latest
    container_name: trippy-payment-service
    restart: unless-stopped
    environment:
      DB_USERNAME: ${DB_USERNAME:-trippy_admin}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/trippy_db?currentSchema=payment_schema
    ports:
      - "8086:8086"
    networks:
      - trippy-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8086/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    image: trippy/api-gateway:latest
    container_name: trippy-api-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - trippy-network
    depends_on:
      user-service:
        condition: service_healthy
      trip-service:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080
    image: trippy/frontend:latest
    container_name: trippy-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - trippy-network
    depends_on:
      - api-gateway

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  trippy-network:
    driver: bridge
    name: trippy-network

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  postgres_data:
    driver: local
    name: trippy-postgres-data
  redis_data:
    driver: local
    name: trippy-redis-data
  rabbitmq_data:
    driver: local
    name: trippy-rabbitmq-data
