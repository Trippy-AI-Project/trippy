# Test profile

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:ai_test;DB_CLOSE_DELAY=-1;INIT=CREATE SCHEMA IF NOT EXISTS ai_schema
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.default_schema=ai_schema
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.flyway.enabled=false

# Disable auto-configurations for tests
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.ai.autoconfigure.openai.OpenAiAutoConfiguration

# Keep selected-service quality runs readable
debug=false
spring.main.banner-mode=off
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.show_sql=false
logging.level.root=WARN
logging.level.pse.trippy.aiservice=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
