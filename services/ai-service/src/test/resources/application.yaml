debug: false

# Test defaults - use H2 in-memory database, no real infrastructure needed.
spring:
  config:
    import: ""
  main:
    banner-mode: "off"
  datasource:
    url: "jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1"
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        show_sql: false
  flyway:
    enabled: false

spring.ai:
  openai:
    api-key: test-key
    base-url: https://api.groq.com/openai
    chat:
      options:
        model: llama-3.3-70b-versatile

logging:
  level:
    root: WARN
    pse.trippy.aiservice: INFO
    org.springframework: WARN
    org.springframework.boot.autoconfigure.logging.ConditionEvaluationReportLogger: "OFF"
    org.hibernate: WARN
    org.hibernate.SQL: WARN
