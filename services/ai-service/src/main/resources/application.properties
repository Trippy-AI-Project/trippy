# AI Service
spring.application.name=ai-service
server.port=8084

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/trippy?currentSchema=ai_schema
spring.datasource.username=trippy_user
spring.datasource.password=trippy_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.default_schema=ai_schema
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# Spring AI (OpenAI)
spring.ai.openai.api-key=${OPENAI_API_KEY:sk-placeholder}
spring.ai.openai.chat.options.model=gpt-4o-mini
spring.ai.openai.chat.options.temperature=0.7

# Redis (Caching)
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
