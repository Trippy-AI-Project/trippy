# =============================================================================
# AI Service - Application Configuration
# =============================================================================

spring.application.name=ai-service
server.port=8084

# =============================================================================
# DataSource - PostgreSQL (ai_schema)
# =============================================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/trippy_db?currentSchema=ai_schema
spring.datasource.username=${DB_USERNAME:trippy_admin}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.pool-name=AiServicePool
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

# =============================================================================
# JPA / Hibernate
# =============================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=ai_schema

# =============================================================================
# Groq AI (OpenAI-compatible)
# Put your Groq API key in GROQ_API_KEY environment variable
# Get your key at: https://console.groq.com/keys
# =============================================================================
spring.ai.openai.api-key=${GROQ_API_KEY}
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.chat.options.model=llama-3.3-70b-versatile
spring.ai.openai.chat.options.temperature=0.7
spring.ai.openai.chat.options.max-tokens=4096

# Groq may return vendor-specific fields (for example usage_breakdown).
# Ignore unknown fields so AI responses do not fail deserialization.
spring.jackson.deserialization.fail-on-unknown-properties=false

# =============================================================================
# Redis - Response Caching
# =============================================================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000

# =============================================================================
# OpenAPI / Swagger
# =============================================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# =============================================================================
# Actuator
# =============================================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
