server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: api-gateway
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cloud:
    gateway:
      routes:
        # User Service Routes
        - id: auth-route
          uri: http://user-service:8081
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=1

        - id: users-route
          uri: http://user-service:8081
          predicates:
            - Path=/users/**
          filters:
            - StripPrefix=1

        - id: wellknown-route
          uri: http://user-service:8081
          predicates:
            - Path=/.well-known/**

        # Trip Service Routes
        - id: trips-route
          uri: http://trip-service:8082
          predicates:
            - Path=/trips/**
          filters:
            - StripPrefix=1

        # Chat Service Routes (REST)
        - id: trips-chat-route
          uri: http://chat-service:8083
          predicates:
            - Path=/trips/**/chat/**
          filters:
            - StripPrefix=3

        # WebSocket Route
        - id: websocket-route
          uri: ws://chat-service:8083
          predicates:
            - Path=/ws/**
          filters:
            - StripPrefix=1

        # AI Service Routes
        - id: ai-route
          uri: http://ai-service:8084
          predicates:
            - Path=/ai/**
          filters:
            - StripPrefix=1

        # Notification Service Routes
        - id: notification-route
          uri: http://notification-service:8085
          predicates:
            - Path=/notifications/**
          filters:
            - StripPrefix=1

        # Payment Service Routes
        - id: payment-route
          uri: http://payment-service:8086
          predicates:
            - Path=/payments/**
          filters:
            - StripPrefix=1

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway
  endpoint:
    health:
      show-details: when-authorized
    gateway:
      enabled: true
  health:
    defaults:
      enabled: true

info:
  app:
    name: Trippy API Gateway
    version: 0.2.0
    description: API Gateway for Trippy platform

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    pse.trippy.apigateway: DEBUG

trippy:
  gateway:
    jwks-url: http://localhost:8081/.well-known/jwks.json
    downstream-services:
      user-service: http://user-service:8081
      trip-service: http://trip-service:8082
      chat-service: http://chat-service:8083
      ai-service: http://ai-service:8084
      notification-service: http://notification-service:8085
      payment-service: http://payment-service:8086
