server:
  port: 8080
  servlet:
    context-path: /

spring:
  config:
    import: "optional:file:../../infra/docker/.env[.properties]"
  application:
    name: api-gateway
  devtools:
    livereload:
      enabled: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
  cloud:
    gateway:
      routes:
        # User Service Routes
        - id: auth-route
          uri: http://localhost:8081
          predicates:
            - Path=/auth/**

        - id: users-route
          uri: http://localhost:8081
          predicates:
            - Path=/users/**

        - id: wellknown-route
          uri: http://localhost:8081
          predicates:
            - Path=/.well-known/**

        # Chat Service Routes (REST) - /trips/{tripId}/chat/**
        # Must be before trips-route so the more specific path matches first
        - id: trips-chat-route
          uri: http://localhost:8083
          predicates:
            - Path=/trips/{tripId}/chat/**

        # Trip Service Routes
        - id: trips-route
          uri: http://localhost:8082
          predicates:
            - Path=/trips/**

        # Chat Service Routes (REST) - /chats/**
        - id: chats-route
          uri: http://localhost:8083
          predicates:
            - Path=/chats/**

        # WebSocket Route
        - id: websocket-route
          uri: http://localhost:8083
          predicates:
            - Path=/ws/**

        # AI Service Routes
        - id: ai-route
          uri: http://localhost:8084
          predicates:
            - Path=/ai/**

        # Notification Service Routes
        - id: notification-route
          uri: http://localhost:8085
          predicates:
            - Path=/notifications/**

        # Payment Service Routes
        - id: payment-route
          uri: http://localhost:8086
          predicates:
            - Path=/payments/**

trippy:
  gateway:
    jwks-uri: ${JWKS_URI:http://localhost:8081/.well-known/jwks.json}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway
  endpoint:
    health:
      show-details: when-authorized
    gateway:
      enabled: true
  health:
    defaults:
      enabled: true

info:
  app:
    name: Trippy API Gateway
    version: 0.2.0
    description: API Gateway for Trippy platform

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    pse.trippy.apigateway: DEBUG
