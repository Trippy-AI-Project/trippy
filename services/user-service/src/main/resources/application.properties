# =============================================================================
# User Service - Application Configuration
# =============================================================================

spring.application.name=user-service
server.port=8081

# =============================================================================
# DataSource - PostgreSQL (user_schema)
# =============================================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/trippy_db?currentSchema=user_schema
spring.datasource.username=${DB_USERNAME:trippy_admin}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool (HikariCP)
spring.datasource.hikari.pool-name=UserServicePool
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

# =============================================================================
# JPA / Hibernate
# =============================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=user_schema

# =============================================================================
# Actuator
# =============================================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# =============================================================================
# Logging
# =============================================================================
logging.level.pse.trippy.userservice=INFO
logging.level.org.hibernate.SQL=WARN

# =============================================================================
# JWT Configuration
# =============================================================================
trippy.jwt.access-token-expiry-seconds=900
trippy.jwt.refresh-token-expiry-days=7
trippy.jwt.remember-me-expiry-days=30

# =============================================================================
# Redis (token blacklist)
# =============================================================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
