# =============================================================================
# User Service - Test Configuration (H2 in-memory database)
# =============================================================================
# H2 folds unquoted identifiers to uppercase, so we create USER_SCHEMA (uppercase)
# in the INIT param. Hibernate's generated SQL (user_schema.users) is also folded
# to USER_SCHEMA.USERS by H2, so both creation and lookup refer to the same schema.

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;INIT=CREATE SCHEMA IF NOT EXISTS USER_SCHEMA
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# JWT Configuration (test values)
trippy.jwt.access-token-expiry-seconds=900
trippy.jwt.refresh-token-expiry-days=7
trippy.jwt.remember-me-expiry-days=30

# Disable RabbitMQ in tests
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
