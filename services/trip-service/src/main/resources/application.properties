# =============================================================================
# Trip Service - Application Configuration
# =============================================================================

spring.application.name=trip-service
server.port=8082
spring.devtools.livereload.enabled=false

# =============================================================================
# DataSource - PostgreSQL (trip_schema)
# =============================================================================
spring.datasource.url=jdbc:postgresql://localhost:5434/trippy_db?currentSchema=trip_schema
spring.datasource.username=${DB_USERNAME:trippy_admin}
spring.datasource.password=${DB_PASSWORD:change_me_postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool (HikariCP)
spring.datasource.hikari.pool-name=TripServicePool
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

# =============================================================================
# JPA / Hibernate
# =============================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=trip_schema
logging.level.org.hibernate.engine.transaction.jta.platform.internal.JtaPlatformInitiator=ERROR
