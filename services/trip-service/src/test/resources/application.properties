# =============================================================================
# Trip Service - Test Configuration (H2 in-memory database)
# =============================================================================
# H2 folds unquoted identifiers to uppercase, so we create TRIP_SCHEMA (uppercase)
# in the INIT param. Hibernate's generated SQL (trip_schema.trips) is also folded
# to TRIP_SCHEMA.TRIPS by H2, so both creation and lookup refer to the same schema.

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;INIT=CREATE SCHEMA IF NOT EXISTS TRIP_SCHEMA
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Disable RabbitMQ auto-configuration for tests
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
