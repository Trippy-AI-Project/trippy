debug: false

# Test defaults - use H2 in-memory database, no real infrastructure needed.
spring:
  config:
    import: ""
  main:
    banner-mode: "off"
  datasource:
    url: "jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;INIT=CREATE SCHEMA IF NOT EXISTS notification_schema"
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        default_schema: notification_schema
        dialect: org.hibernate.dialect.H2Dialect
        show_sql: false
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
      - org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration
  rabbitmq:
    host: localhost
    port: 0

logging:
  level:
    root: WARN
    pse.trippy.notificationservice: INFO
    org.springframework: WARN
    org.springframework.boot.autoconfigure.logging.ConditionEvaluationReportLogger: "OFF"
    org.hibernate: WARN
    org.hibernate.SQL: WARN
