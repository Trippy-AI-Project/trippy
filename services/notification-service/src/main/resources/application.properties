# ─── Application ─────────────────────────────────────────────
spring.application.name=notification-service
server.port=8085

# ─── PostgreSQL ──────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/trippy_db?currentSchema=notification_schema
spring.datasource.username=${DB_USERNAME:trippy_admin}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.default_schema=notification_schema
spring.jpa.open-in-view=false

# ─── Spring Mail ─────────────────────────────────────────────
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ─── RabbitMQ ────────────────────────────────────────────────
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=${MQ_USERNAME:trippy_mq}
spring.rabbitmq.password=${MQ_PASSWORD}
spring.rabbitmq.virtual-host=trippy

# ─── Actuator ────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
