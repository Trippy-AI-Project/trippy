# =============================================================================
# Notification Service - Application Configuration
# =============================================================================

spring.application.name=notification-service
server.port=8085
spring.devtools.livereload.enabled=false

# =============================================================================
# DataSource - PostgreSQL (notification_schema)
# =============================================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/trippy_db?currentSchema=notification_schema
spring.datasource.username=${DB_USERNAME:trippy_admin}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.pool-name=NotificationServicePool
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

# =============================================================================
# JPA / Hibernate
# =============================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=notification_schema

# =============================================================================
# Spring Mail
# =============================================================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:noreply@trippy.local}
spring.mail.password=${MAIL_PASSWORD:placeholder}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# =============================================================================
# RabbitMQ
# =============================================================================
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=${MQ_USERNAME:trippy_mq}
spring.rabbitmq.password=${MQ_PASSWORD:CHANGE_ME_RABBITMQ_PASSWORD_789!}
spring.rabbitmq.virtual-host=trippy

# =============================================================================
# Actuator
# =============================================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# =============================================================================
# Logging
# =============================================================================
logging.level.pse.trippy.notificationservice=INFO
