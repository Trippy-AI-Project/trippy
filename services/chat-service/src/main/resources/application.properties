# =============================================================================
# Chat Service - Application Configuration
# =============================================================================

spring.application.name=chat-service
server.port=8083
spring.main.allow-circular-references=true
spring.devtools.livereload.enabled=false

# =============================================================================
# DataSource - PostgreSQL (chat_schema)
# =============================================================================
spring.datasource.url=jdbc:postgresql://localhost:5434/trippy_db?currentSchema=chat_schema
spring.datasource.username=${DB_USERNAME:trippy_admin}
spring.datasource.password=${DB_PASSWORD:change_me_postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool (HikariCP)
spring.datasource.hikari.pool-name=ChatServicePool
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

# =============================================================================
# JPA / Hibernate
# =============================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=chat_schema

# =============================================================================
# RabbitMQ
# =============================================================================
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=${MQ_USERNAME:trippy_mq}
spring.rabbitmq.password=${MQ_PASSWORD:change_me_rabbitmq}
spring.rabbitmq.virtual-host=trippy

# =============================================================================
# Actuator
# =============================================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# =============================================================================
# Trip Service (inter-service communication)
# =============================================================================
trippy.trip-service.url=${TRIP_SERVICE_URL:http://localhost:8082}

# =============================================================================
# Logging
# =============================================================================
logging.level.pse.trippy.chatservice=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.engine.transaction.jta.platform.internal.JtaPlatformInitiator=ERROR
logging.level.org.springframework.messaging.simp.stomp.StompBrokerRelayMessageHandler=ERROR
logging.level.reactor.netty.tcp.TcpClient=ERROR

# =============================================================================
# File Upload
# =============================================================================
trippy.chat.upload-dir=./uploads/chat
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
