# Test profile

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:payment_test;DB_CLOSE_DELAY=-1;INIT=CREATE SCHEMA IF NOT EXISTS payment_schema
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.default_schema=payment_schema

# Disable RabbitMQ auto-configuration for tests
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
