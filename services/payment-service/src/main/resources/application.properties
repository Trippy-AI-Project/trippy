# =============================================================================
# Payment Service - Application Configuration
# =============================================================================

spring.application.name=payment-service
server.port=8085

# =============================================================================
# DataSource - PostgreSQL (payment_schema)
# =============================================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/trippy_db?currentSchema=payment_schema
spring.datasource.username=${DB_USERNAME:trippy_admin}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool (HikariCP)
spring.datasource.hikari.pool-name=PaymentServicePool
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

# =============================================================================
# JPA / Hibernate
# =============================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=payment_schema

# =============================================================================
# Actuator
# =============================================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# =============================================================================
# Logging
# =============================================================================
logging.level.pse.trippy.paymentservice=INFO
logging.level.org.hibernate.SQL=WARN
