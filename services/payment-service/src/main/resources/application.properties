# Payment Service
spring.application.name=payment-service
server.port=8086

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/trippy?currentSchema=payment_schema
spring.datasource.username=trippy_user
spring.datasource.password=trippy_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.default_schema=payment_schema
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=trippy_admin
spring.rabbitmq.password=trippy_pass
spring.rabbitmq.virtual-host=trippy

# Stripe
stripe.api.key=${STRIPE_API_KEY:sk_test_placeholder}

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
