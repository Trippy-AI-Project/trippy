# =============================================================================
# Payment Service - Application Configuration
# =============================================================================

spring.application.name=payment-service
server.port=8086
spring.devtools.livereload.enabled=false

# =============================================================================
# DataSource - PostgreSQL (payment_schema)
# =============================================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/trippy_db?currentSchema=payment_schema
spring.datasource.username=${DB_USERNAME:trippy_admin}
spring.datasource.password=${DB_PASSWORD}
# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5434/trippy_db?currentSchema=payment_schema
spring.datasource.username=${DB_USERNAME:trippy_admin}
spring.datasource.password=${DB_PASSWORD:change_me_postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool (HikariCP)
spring.datasource.hikari.pool-name=PaymentServicePool
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

# =============================================================================
# JPA / Hibernate
# =============================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=payment_schema

# =============================================================================
spring.jpa.properties.hibernate.default_schema=payment_schema
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
logging.level.org.hibernate.engine.transaction.jta.platform.internal.JtaPlatformInitiator=ERROR

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=${MQ_USERNAME:trippy_mq}
spring.rabbitmq.password=${MQ_PASSWORD:CHANGE_ME_RABBITMQ_PASSWORD_789!}
spring.rabbitmq.virtual-host=trippy

# Stripe
stripe.api.key=${STRIPE_API_KEY:sk_test_placeholder}

# Actuator
# =============================================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# =============================================================================
# Logging
# =============================================================================
logging.level.pse.trippy.paymentservice=INFO
logging.level.org.hibernate.SQL=WARN
