# =============================================================================
# Trippy Platform - CI/CD Pipeline
# =============================================================================
# This workflow runs build and test checks for pull requests and pushes
# to dev/prod branches. All services must build and pass tests.
# =============================================================================

name: CI Build & Test

on:
  push:
    branches: [ dev, prod ]
  pull_request:
    branches: [ dev, prod ]

permissions:
  contents: read
  checks: write
  pull-requests: write

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: 'temurin'
  MAVEN_OPTS: '-Xmx1024m'

jobs:
  # ===========================================================================
  # DETECT CHANGES - Determined which services need to be built
  # ===========================================================================
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      api-gateway: ${{ steps.changes.outputs.api-gateway }}
      user-service: ${{ steps.changes.outputs.user-service }}
      trip-service: ${{ steps.changes.outputs.trip-service }}
      chat-service: ${{ steps.changes.outputs.chat-service }}
      ai-service: ${{ steps.changes.outputs.ai-service }}
      notification-service: ${{ steps.changes.outputs.notification-service }}
      payment-service: ${{ steps.changes.outputs.payment-service }}
      any-service: ${{ steps.changes.outputs.any-service }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect file changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api-gateway:
              - 'services/api-gateway/**'
              - 'pom.xml'
            user-service:
              - 'services/user-service/**'
              - 'pom.xml'
            trip-service:
              - 'services/trip-service/**'
              - 'pom.xml'
            chat-service:
              - 'services/chat-service/**'
              - 'pom.xml'
            ai-service:
              - 'services/ai-service/**'
              - 'pom.xml'
            notification-service:
              - 'services/notification-service/**'
              - 'pom.xml'
            payment-service:
              - 'services/payment-service/**'
              - 'pom.xml'
            any-service:
              - 'services/**'
              - 'pom.xml'

  # ===========================================================================
  # BUILD PARENT POM - Validate parent POM and install to local repo
  # ===========================================================================
  build-parent:
    name: Build Parent POM
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.any-service == 'true' || github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: Validate Parent POM
        run: mvn validate -N -B

      - name: Install Parent POM
        run: mvn install -N -B -DskipTests

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

  # ===========================================================================
  # BUILD & TEST SERVICES
  # ===========================================================================
  build-api-gateway:
    name: Build API Gateway
    runs-on: ubuntu-latest
    needs: [detect-changes, build-parent]
    if: |
      always() && 
      needs.build-parent.result == 'success' &&
      (needs.detect-changes.outputs.api-gateway == 'true' || github.event_name == 'push')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: Build & Test API Gateway
        run: |
          mvn install -N -B -DskipTests
          mvn -pl services/api-gateway clean verify -B -DskipTests=false


      - name: Run static analysis (PMD)
        run: |
          mvn -pl services/api-gateway -B -DskipTests pmd:check

      - name: Setup reviewdog
        if: github.event_name == 'pull_request'
        uses: reviewdog/action-setup@v1

      - name: Reviewdog annotations
        if: github.event_name == 'pull_request'
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          reviewdog -f=pmd -name="pmd" -reporter=github-pr-review -filter-mode=diff_context < services/api-gateway/target/pmd.xml

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-gateway-test-results
          path: services/api-gateway/target/surefire-reports/
          retention-days: 7

  build-user-service:
    name: Build User Service
    runs-on: ubuntu-latest
    needs: [detect-changes, build-parent]
    if: |
      always() && 
      needs.build-parent.result == 'success' &&
      (needs.detect-changes.outputs.user-service == 'true' || github.event_name == 'push')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: Build & Test User Service
        run: |
          mvn install -N -B -DskipTests
          mvn -pl services/user-service clean verify -B -DskipTests=false


      - name: Run static analysis (PMD)
        run: |
          mvn -pl services/user-service -B -DskipTests pmd:check

      - name: Setup reviewdog
        if: github.event_name == 'pull_request'
        uses: reviewdog/action-setup@v1

      - name: Reviewdog annotations
        if: github.event_name == 'pull_request'
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          reviewdog -f=pmd -name="pmd" -reporter=github-pr-review -filter-mode=diff_context < services/user-service/target/pmd.xml

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: user-service-test-results
          path: services/user-service/target/surefire-reports/
          retention-days: 7

  build-trip-service:
    name: Build Trip Service
    runs-on: ubuntu-latest
    needs: [detect-changes, build-parent]
    if: |
      always() && 
      needs.build-parent.result == 'success' &&
      (needs.detect-changes.outputs.trip-service == 'true' || github.event_name == 'push')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: Build & Test Trip Service
        run: |
          mvn install -N -B -DskipTests
          mvn -pl services/trip-service clean verify -B -DskipTests=false


      - name: Run static analysis (PMD)
        run: |
          mvn -pl services/trip-service -B -DskipTests pmd:check

      - name: Setup reviewdog
        if: github.event_name == 'pull_request'
        uses: reviewdog/action-setup@v1

      - name: Reviewdog annotations
        if: github.event_name == 'pull_request'
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          reviewdog -f=pmd -name="pmd" -reporter=github-pr-review -filter-mode=diff_context < services/trip-service/target/pmd.xml

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trip-service-test-results
          path: services/trip-service/target/surefire-reports/
          retention-days: 7

  build-chat-service:
    name: Build Chat Service
    runs-on: ubuntu-latest
    needs: [detect-changes, build-parent]
    if: |
      always() && 
      needs.build-parent.result == 'success' &&
      (needs.detect-changes.outputs.chat-service == 'true' || github.event_name == 'push')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: Build & Test Chat Service
        run: |
          mvn install -N -B -DskipTests
          mvn -pl services/chat-service clean verify -B -DskipTests=false


      - name: Run static analysis (PMD)
        run: |
          mvn -pl services/chat-service -B -DskipTests pmd:check

      - name: Setup reviewdog
        if: github.event_name == 'pull_request'
        uses: reviewdog/action-setup@v1

      - name: Reviewdog annotations
        if: github.event_name == 'pull_request'
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          reviewdog -f=pmd -name="pmd" -reporter=github-pr-review -filter-mode=diff_context < services/chat-service/target/pmd.xml

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chat-service-test-results
          path: services/chat-service/target/surefire-reports/
          retention-days: 7

  build-ai-service:
    name: Build AI Service
    runs-on: ubuntu-latest
    needs: [detect-changes, build-parent]
    if: |
      always() && 
      needs.build-parent.result == 'success' &&
      (needs.detect-changes.outputs.ai-service == 'true' || github.event_name == 'push')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: Build & Test AI Service
        run: |
          mvn install -N -B -DskipTests
          mvn -pl services/ai-service clean verify -B -DskipTests=false


      - name: Run static analysis (PMD)
        run: |
          mvn -pl services/ai-service -B -DskipTests pmd:check

      - name: Setup reviewdog
        if: github.event_name == 'pull_request'
        uses: reviewdog/action-setup@v1

      - name: Reviewdog annotations
        if: github.event_name == 'pull_request'
