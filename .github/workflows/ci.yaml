          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          reviewdog -f=pmd -name="pmd" -reporter=github-pr-review -filter-mode=diff_context < services/ai-service/target/pmd.xml

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-service-test-results
          path: services/ai-service/target/surefire-reports/
          retention-days: 7

  build-notification-service:
    name: Build Notification Service
    runs-on: ubuntu-latest
    needs: [detect-changes, build-parent]
    if: |
      always() && 
      needs.build-parent.result == 'success' &&
      (needs.detect-changes.outputs.notification-service == 'true' || github.event_name == 'push')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: Build & Test Notification Service
        run: |
          mvn install -N -B -DskipTests
          mvn -pl services/notification-service clean verify -B -DskipTests=false


      - name: Run static analysis (PMD)
        run: |
          mvn -pl services/notification-service -B -DskipTests pmd:check

      - name: Setup reviewdog
        if: github.event_name == 'pull_request'
        uses: reviewdog/action-setup@v1

      - name: Reviewdog annotations
        if: github.event_name == 'pull_request'
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          reviewdog -f=pmd -name="pmd" -reporter=github-pr-review -filter-mode=diff_context < services/notification-service/target/pmd.xml

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: notification-service-test-results
          path: services/notification-service/target/surefire-reports/
          retention-days: 7

  build-payment-service:
    name: Build Payment Service
    runs-on: ubuntu-latest
    needs: [detect-changes, build-parent]
    if: |
      always() && 
      needs.build-parent.result == 'success' &&
      (needs.detect-changes.outputs.payment-service == 'true' || github.event_name == 'push')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: Build & Test Payment Service
        run: |
          mvn install -N -B -DskipTests
          mvn -pl services/payment-service clean verify -B -DskipTests=false


      - name: Run static analysis (PMD)
        run: |
          mvn -pl services/payment-service -B -DskipTests pmd:check

      - name: Setup reviewdog
        if: github.event_name == 'pull_request'
        uses: reviewdog/action-setup@v1

      - name: Reviewdog annotations
        if: github.event_name == 'pull_request'
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          reviewdog -f=pmd -name="pmd" -reporter=github-pr-review -filter-mode=diff_context < services/payment-service/target/pmd.xml

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: payment-service-test-results
          path: services/payment-service/target/surefire-reports/
          retention-days: 7

  # ===========================================================================
  # FINAL STATUS CHECK - Gate for merging
  # ===========================================================================
  ci-status:
    name: CI Status Check
    runs-on: ubuntu-latest
    needs:
      - build-parent
      - build-api-gateway
      - build-user-service
      - build-trip-service
      - build-chat-service
      - build-ai-service
      - build-notification-service
      - build-payment-service
    if: always()
    steps:
      - name: Check Build Results
        run: |
          echo "Build Parent: ${{ needs.build-parent.result }}"
          echo "API Gateway: ${{ needs.build-api-gateway.result }}"
          echo "User Service: ${{ needs.build-user-service.result }}"
          echo "Trip Service: ${{ needs.build-trip-service.result }}"
          echo "Chat Service: ${{ needs.build-chat-service.result }}"
          echo "AI Service: ${{ needs.build-ai-service.result }}"
          echo "Notification Service: ${{ needs.build-notification-service.result }}"
          echo "Payment Service: ${{ needs.build-payment-service.result }}"
          
          # Check if any required job failed
          if [[ "${{ needs.build-parent.result }}" == "failure" ]]; then
            echo "❌ Parent POM build failed"
            exit 1
          fi
          
          # Check each service (skipped is OK, failure is not)
          for result in \
            "${{ needs.build-api-gateway.result }}" \
            "${{ needs.build-user-service.result }}" \
            "${{ needs.build-trip-service.result }}" \
            "${{ needs.build-chat-service.result }}" \
            "${{ needs.build-ai-service.result }}" \
            "${{ needs.build-notification-service.result }}" \
            "${{ needs.build-payment-service.result }}"
          do
            if [[ "$result" == "failure" ]]; then
              echo "❌ One or more services failed to build"
              exit 1
            fi
          done
          
          echo "✅ All builds passed!"
