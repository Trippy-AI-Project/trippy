# =============================================================================
# RabbitMQ Configuration - Production Ready
# =============================================================================

# Listeners
listeners.tcp.default = 5672

# Management Plugin
management.tcp.port = 15672
management.load_definitions = /etc/rabbitmq/definitions.json

# STOMP Plugin (for WebSocket support)
stomp.listeners.tcp.1 = 61613
stomp.default_user = trippy_mq
stomp.default_pass = CHANGE_ME_RABBITMQ_PASSWORD_789!

# Memory & Disk
vm_memory_high_watermark.relative = 0.7
vm_memory_high_watermark_paging_ratio = 0.75
disk_free_limit.absolute = 2GB

# Logging
log.console = true
log.console.level = info
log.file = false

# Clustering (for future scaling)
cluster_formation.peer_discovery_backend = rabbit_peer_discovery_classic_config
cluster_partition_handling = pause_minority

# Queue defaults
queue_master_locator = min-masters

# Connection settings
heartbeat = 60
channel_max = 2047
max_message_size = 134217728

# SSL/TLS (enable in production with proper certs)
# ssl_options.cacertfile = /etc/rabbitmq/ca_certificate.pem
# ssl_options.certfile = /etc/rabbitmq/server_certificate.pem
# ssl_options.keyfile = /etc/rabbitmq/server_key.pem
# ssl_options.verify = verify_peer
# ssl_options.fail_if_no_peer_cert = false
