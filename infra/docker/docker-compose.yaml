# =============================================================================
# Trippy Platform - Production-Ready Infrastructure Docker Compose
# =============================================================================
# Services: PostgreSQL, Redis, RabbitMQ, SonarQube
#
# Usage:
#   cp .env.example .env  # Then edit .env with your values
#   docker-compose up -d
#   docker-compose logs -f
#
# =============================================================================

name: trippy

services:
  # ===========================================================================
  # POSTGRESQL - Primary Database
  # ===========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: trippy-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB:-trippy_db}
      POSTGRES_USER: ${POSTGRES_USER:-trippy_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
      PGDATA: /var/lib/postgresql/data/pgdata

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts/postgres:/docker-entrypoint-initdb.d:ro
      - ./config/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro

    ports:
      - "${POSTGRES_PORT:-5434}:5432"

    networks:
      - trippy-network

    command: >
      postgres 
      -c max_connections=${POSTGRES_MAX_CONNECTIONS:-200}
      -c shared_buffers=${POSTGRES_SHARED_BUFFERS:-256MB}
      -c effective_cache_size=1GB
      -c maintenance_work_mem=128MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=4MB
      -c min_wal_size=1GB
      -c max_wal_size=4GB
      -c max_worker_processes=4
      -c max_parallel_workers_per_gather=2
      -c max_parallel_workers=4
      -c max_parallel_maintenance_workers=2
      -c log_statement=mod
      -c log_duration=on
      -c log_min_duration_statement=1000

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trippy_admin} -d ${POSTGRES_DB:-trippy_db}"]
      interval: ${HEALTHCHECK_INTERVAL:-30s}
      timeout: ${HEALTHCHECK_TIMEOUT:-10s}
      retries: ${HEALTHCHECK_RETRIES:-3}
      start_period: ${HEALTHCHECK_START_PERIOD:-60s}

    deploy:
      resources:
        limits:
          cpus: 2
          memory: 2g
        reservations:
          memory: 1g

    logging:
      driver: "json-file"
      options:
        max-size: "${LOG_MAX_SIZE:-50m}"
        max-file: "${LOG_MAX_FILE:-5}"

  # ===========================================================================
  # REDIS - Caching, Session Store, Rate Limiting, Token Blacklist
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: trippy-redis
    restart: unless-stopped

    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --maxmemory ${REDIS_MAXMEMORY:-512mb}
      --maxmemory-policy ${REDIS_MAXMEMORY_POLICY:-allkeys-lru}
      --appendonly yes
      --appendfsync everysec
      --tcp-keepalive 300
      --timeout 0
      --tcp-backlog 511
      --loglevel notice
      --databases 16

    volumes:
      - redis_data:/data

    ports:
      - "${REDIS_PORT:-6379}:6379"

    networks:
      - trippy-network

    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: ${HEALTHCHECK_INTERVAL:-30s}
      timeout: ${HEALTHCHECK_TIMEOUT:-10s}
      retries: ${HEALTHCHECK_RETRIES:-3}
      start_period: ${HEALTHCHECK_START_PERIOD:-60s}

    deploy:
      resources:
        limits:
          cpus: 1
          memory: 1g
        reservations:
          memory: 512m

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ===========================================================================
  # RABBITMQ - Message Broker for Async Communication
  # ===========================================================================
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: trippy-rabbitmq
    hostname: trippy-rabbitmq
    restart: unless-stopped

    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-trippy_mq}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:?RABBITMQ_DEFAULT_PASS is required}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_DEFAULT_VHOST:-trippy}
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbit log_levels [{connection,error},{default,info}] disk_free_limit 2147483648"

    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./config/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./config/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
      - ./config/rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro

    ports:
      - "${RABBITMQ_PORT:-5672}:5672"           # AMQP
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"  # Management UI
      - "61613:61613"                            # STOMP (for WebSocket)

    networks:
      - trippy-network

    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: ${HEALTHCHECK_INTERVAL:-30s}
      timeout: ${HEALTHCHECK_TIMEOUT:-10s}
      retries: ${HEALTHCHECK_RETRIES:-3}
      start_period: ${HEALTHCHECK_START_PERIOD:-60s}

    deploy:
      resources:
        limits:
          cpus: 1
          memory: 1g
        reservations:
          memory: 512m

    logging:
      driver: "json-file"
      options:
        max-size: "${LOG_MAX_SIZE:-50m}"
        max-file: "${LOG_MAX_FILE:-5}"



# =============================================================================
# NETWORKS
# =============================================================================
networks:
  trippy-network:
    driver: bridge
    name: trippy-network
    ipam:
      driver: default
      config:
        - subnet: ${NETWORK_SUBNET:-172.28.0.0/16}

# =============================================================================
# VOLUMES - Persistent Data Storage
# =============================================================================
volumes:
  postgres_data:
    driver: local
    name: trippy-postgres-data

  redis_data:
    driver: local
    name: trippy-redis-data

  rabbitmq_data:
    driver: local
    name: trippy-rabbitmq-data
